<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자비스 기록 v2026.07.07.3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @keyframes blink { 50% { opacity: 0.25; } }
    @keyframes sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(1400%); } }

    body[data-theme="concierge"]{--bg:oklch(0.985 0.007 75);--card:#ffffff;--text:oklch(0.24 0.01 60);--text2:oklch(0.55 0.02 60);--border:oklch(0.92 0.008 70);--btn-bg:oklch(0.62 0.13 45);--btn-text:#fff;--arrive:oklch(0.5 0.11 150);--depart:oklch(0.58 0.16 30);--ok-bg:oklch(0.95 0.04 150);--ok-text:oklch(0.42 0.11 150);--err-bg:oklch(0.95 0.045 30);--err-text:oklch(0.5 0.16 30);--meta-bg:oklch(0.97 0.006 70);--shadow:0 1px 3px rgba(60,40,20,0.08);--radius:18px;--input-radius:12px;--font:'Pretendard',sans-serif;--head:'Pretendard',sans-serif;--mono:'JetBrains Mono',monospace;--page:oklch(0.955 0.006 70);--grid:none;--accent:oklch(0.62 0.13 45);--label-tt:uppercase;--label-sp:0.5px;}
    body[data-theme="hud"]{--bg:oklch(0.15 0.012 250);--card:oklch(0.19 0.012 250);--text:oklch(0.92 0.01 220);--text2:oklch(0.6 0.02 220);--border:oklch(0.34 0.02 220);--btn-bg:oklch(0.78 0.13 200);--btn-text:oklch(0.15 0.012 250);--arrive:oklch(0.82 0.13 200);--depart:oklch(0.72 0.16 25);--ok-bg:oklch(0.3 0.05 200);--ok-text:oklch(0.85 0.13 200);--err-bg:oklch(0.3 0.08 25);--err-text:oklch(0.82 0.14 25);--meta-bg:oklch(0.22 0.012 250);--shadow:0 0 0 1px oklch(0.3 0.02 220);--radius:10px;--input-radius:8px;--font:'Pretendard',sans-serif;--head:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;--page:oklch(0.1 0.01 250);--grid:linear-gradient(oklch(0.2 0.012 250) 1px,transparent 1px),linear-gradient(90deg,oklch(0.2 0.012 250) 1px,transparent 1px);--accent:oklch(0.78 0.13 200);--label-tt:uppercase;--label-sp:1.5px;}
    body[data-theme="calm"]{--bg:oklch(0.985 0.003 255);--card:oklch(0.985 0.003 255);--text:oklch(0.26 0.01 255);--text2:oklch(0.58 0.01 255);--border:oklch(0.9 0.004 255);--btn-bg:oklch(0.5 0.06 155);--btn-text:#fff;--arrive:oklch(0.5 0.09 150);--depart:oklch(0.55 0.1 30);--ok-bg:oklch(0.96 0.02 155);--ok-text:oklch(0.42 0.07 155);--err-bg:oklch(0.96 0.02 30);--err-text:oklch(0.5 0.12 30);--meta-bg:oklch(0.97 0.003 255);--shadow:none;--radius:14px;--input-radius:12px;--font:'Pretendard',sans-serif;--head:'Space Grotesk',sans-serif;--mono:'Space Grotesk',sans-serif;--page:oklch(0.965 0.003 255);--grid:none;--accent:oklch(0.5 0.06 155);--label-tt:none;--label-sp:0;}
    body[data-theme="apple"]{--bg:#ffffff;--card:#ffffff;--text:oklch(0.2 0.003 255);--text2:oklch(0.53 0.006 255);--border:oklch(0.91 0.003 255);--btn-bg:oklch(0.58 0.19 260);--btn-text:#fff;--arrive:oklch(0.66 0.17 145);--depart:oklch(0.63 0.22 25);--ok-bg:oklch(0.95 0.05 145);--ok-text:oklch(0.45 0.14 145);--err-bg:oklch(0.95 0.05 25);--err-text:oklch(0.52 0.19 25);--meta-bg:oklch(0.965 0.003 255);--shadow:0 1px 2px rgba(0,0,0,0.04),0 6px 20px rgba(0,0,0,0.06);--radius:20px;--input-radius:14px;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;--head:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;--mono:'SF Mono','JetBrains Mono',monospace;--page:oklch(0.975 0.002 255);--grid:none;--accent:oklch(0.58 0.19 260);--label-tt:none;--label-sp:0;}

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body{background:var(--page);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
    .mono{font-family:var(--mono);}
    .container{max-width:600px;margin:0 auto;padding:18px 18px 60px;background-image:var(--grid);background-size:26px 26px;min-height:100vh;position:relative;}
    .scan{display:none;position:fixed;top:0;left:0;right:0;height:70px;pointer-events:none;background:linear-gradient(oklch(0.78 0.13 200 / 0.07),transparent);z-index:1;}
    body[data-theme="hud"] .scan{display:block;animation:sweep 6s linear infinite;}

    /* 헤더 */
    .header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;position:relative;z-index:2;flex-wrap:wrap;}
    .brand{display:flex;align-items:center;gap:7px;font-family:var(--head);font-weight:700;font-size:16px;letter-spacing:-0.01em;}
    .brand .ver{font-size:11px;font-weight:400;color:var(--text2);margin-left:6px;}
    .moodbar{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:3px;box-shadow:var(--shadow);}
    .mood{border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:600;padding:6px 13px;border-radius:18px;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .mood.active{background:var(--accent);color:var(--btn-text);}
    .icon-btn{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:var(--input-radius);padding:8px 11px;font-size:13px;cursor:pointer;}

    /* 히어로 */
    #hero-concierge,#hero-hud,#hero-calm,#hero-apple{display:none;position:relative;z-index:2;margin-bottom:18px;}
    body[data-theme="concierge"] #hero-concierge{display:block;}
    body[data-theme="hud"] #hero-hud{display:block;}
    body[data-theme="calm"] #hero-calm{display:flex;justify-content:space-between;align-items:flex-start;}
    body[data-theme="apple"] #hero-apple{display:block;}

    /* 카드 */
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;z-index:2;}
    h2{font-size:12px;font-weight:700;color:var(--text2);text-transform:var(--label-tt);letter-spacing:var(--label-sp);margin-bottom:12px;font-family:var(--font);}
    body[data-theme="hud"] h2{color:var(--accent);font-family:var(--mono);}
    body[data-theme="hud"] h2::before{content:'> ';}

    /* 토큰 배너 */
    .token-banner{background:var(--card);border:1px solid var(--accent);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:13px;color:var(--text);position:relative;z-index:2;}
    .token-banner input{width:100%;margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--input-radius);font-size:13px;font-family:var(--mono);background:var(--card);color:var(--text);}
    .token-banner button{margin-top:8px;padding:7px 16px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--input-radius);font-size:13px;cursor:pointer;font-family:var(--font);}

    /* 인풋 */
    .row{display:flex;gap:8px;margin-bottom:10px;}
    input[type=text],input[type=time],input[type=date],select{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:14px;background:var(--card);color:var(--text);font-family:var(--font);}
    input[type=text]{flex:1;}
    input:focus,select:focus{outline:none;border-color:var(--accent);}
    select{cursor:pointer;}
    .time-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;color:var(--text2);}
    .time-row input{width:120px;}
    .hint{font-size:11px;color:var(--text2);}

    /* 전송 버튼 */
    .send-btn{width:100%;padding:12px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--input-radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);}
    .send-btn:active{opacity:.85;}
    body[data-theme="hud"] .send-btn{font-family:var(--mono);letter-spacing:1px;}

    /* 결과 */
    #result{margin-top:10px;padding:10px 14px;border-radius:var(--input-radius);font-size:13px;display:none;position:relative;z-index:2;font-family:var(--font);}
    #result.ok{background:var(--ok-bg);color:var(--ok-text);}
    #result.err{background:var(--err-bg);color:var(--err-text);}

    /* 팝업 오버레이 */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
    .overlay.show{display:flex;}
    .popup{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:90%;max-width:420px;box-shadow:0 10px 40px rgba(0,0,0,0.3);font-family:var(--font);}
    .popup-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
    .popup-text{font-size:14px;background:var(--meta-bg);padding:10px 12px;border-radius:var(--input-radius);margin-bottom:12px;color:var(--text);word-break:break-all;}
    .popup-label{font-size:12px;color:var(--text2);margin-bottom:6px;}
    .popup select{width:100%;margin-bottom:14px;}
    .popup-btns{display:flex;gap:8px;}
    .popup-btns button{flex:1;padding:10px;border-radius:var(--input-radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);border:1.5px solid var(--border);}
    .btn-confirm{background:var(--btn-bg);color:var(--btn-text);border-color:var(--btn-bg);}
    .btn-cancel{background:var(--card);color:var(--text);}

    /* 일지 조회 */
    .diary-view{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);display:none;position:relative;z-index:2;}
    .diary-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .diary-title{font-size:15px;font-weight:700;}
    .close-btn{padding:6px 12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);}
    .diary-meta{background:var(--meta-bg);border-radius:var(--input-radius);padding:8px 12px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text2);}
    .tl-actions{display:flex;gap:4px;margin-left:auto;padding-left:8px;flex-shrink:0;}
    .tl-action-btn{padding:2px 7px;font-size:11px;border:1.5px solid var(--border);border-radius:var(--input-radius);background:var(--card);color:var(--text);cursor:pointer;font-family:var(--font);line-height:1.6;}
    .tl-action-btn:active{opacity:.7;}
    .timeline{max-height:440px;overflow-y:auto;}
    .tl-item{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start;}
    .tl-time{font-size:12px;color:var(--text2);min-width:42px;padding-top:2px;text-align:right;font-family:var(--mono);}
    .tl-col{display:flex;flex-direction:column;align-items:center;}
    .tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    body[data-theme="hud"] .tl-dot{border-radius:0;}
    .tl-bar{width:2px;background:var(--border);flex:1;min-height:14px;margin-top:2px;}
    .tl-body{flex:1;}
    .tl-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:2px;}
    .tl-text{font-size:14px;line-height:1.5;color:var(--text);}
    .d-location{background:#2196f3} .d-lunch{background:#ff9800} .d-dinner{background:#e91e63}
    .d-work{background:#4caf50} .d-memo{background:#9c27b0} .d-life{background:#00bcd4}
    .d-good{background:#8bc34a} .d-learn{background:#ff5722} .d-tomorrow{background:#607d8b}

    /* 조회 버튼 행 */
    .view-row{display:flex;gap:8px;}
    .view-btn{flex:1;padding:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text);border-radius:var(--input-radius);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);}

    /* 하단 */
    .footer{text-align:center;color:var(--text2);font-size:11px;padding:16px 0 20px;position:relative;z-index:2;}
    body[data-theme="hud"] .footer{font-family:var(--mono);}
  </style>
</head>
<body data-theme="concierge">
<div class="scan"></div>
<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <div class="brand"><span>🤖</span><span>자비스 기록</span><span class="ver">v2026.07.07.3</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="moodbar">
        <button class="mood" data-t="concierge" onclick="setTheme('concierge')">비서</button>
        <button class="mood" data-t="hud" onclick="setTheme('hud')">자비스</button>
        <button class="mood" data-t="calm" onclick="setTheme('calm')">조용</button>
        <button class="mood" data-t="apple" onclick="setTheme('apple')">애플</button>
      </div>
      <button class="icon-btn" onclick="changeToken()">🔑</button>
    </div>
  </div>

  <!-- 토큰 배너 -->
  <div class="token-banner" id="tokenBanner">
    <strong>⚙️ 처음 한 번만:</strong> GitHub 토큰을 입력하세요.
    <input type="password" id="tokenInput" placeholder="ghp_...">
    <button onclick="saveToken()">저장</button>
  </div>

  <!-- 히어로 (테마별) -->
  <div id="hero-concierge">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="mono" id="hc-date" style="font-size:11px;letter-spacing:1px;color:var(--accent);text-transform:uppercase;"></div>
        <div style="font-family:var(--head);font-size:26px;font-weight:800;letter-spacing:-0.02em;margin-top:4px;">사장님, 어서오세요</div>
      </div>
      <div style="width:42px;height:42px;border-radius:50%;background:var(--text);color:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;">👔</div>
    </div>
  </div>

  <div id="hero-hud" style="border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:9px;">
        <span style="width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 1.8s infinite;"></span>
        <span style="font-family:var(--head);font-size:16px;font-weight:600;letter-spacing:.5px;">J.A.R.V.I.S</span>
      </div>
      <span class="mono" id="hh-status" style="font-size:11px;letter-spacing:1px;color:var(--accent);">ONLINE</span>
    </div>
    <div style="display:flex;gap:9px;">
      <div style="flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px;"><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--text2);">DATE</div><div id="hh-date" class="mono" style="font-size:14px;font-weight:700;color:var(--accent);margin-top:3px;"></div></div>
      <div style="flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px;"><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--text2);">TIME</div><div id="hh-time" class="mono" style="font-size:14px;font-weight:700;color:var(--accent);margin-top:3px;"></div></div>
      <div style="flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px;"><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--text2);">GPS</div><div class="mono" style="font-size:14px;font-weight:700;color:var(--accent);margin-top:3px;">READY</div></div>
    </div>
  </div>

  <div id="hero-calm">
    <div>
      <div id="cc-weekday" style="font-size:13px;color:var(--text2);"></div>
      <div id="cc-date" style="font-family:var(--head);font-size:40px;font-weight:600;letter-spacing:-0.02em;line-height:1;margin-top:2px;"></div>
    </div>
    <span id="cc-status" style="font-size:12px;color:var(--text2);border:1px solid var(--border);border-radius:20px;padding:6px 13px;"></span>
  </div>

  <div id="hero-apple" style="border-radius:var(--radius);padding:20px;background:var(--meta-bg);box-shadow:var(--shadow);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div id="ap-weekday" style="font-size:13px;color:var(--text2);font-weight:600;"></div>
        <div id="ap-date" style="font-family:var(--head);font-size:30px;font-weight:700;letter-spacing:-0.02em;margin-top:2px;"></div>
        <div style="font-size:14px;color:var(--text2);margin-top:6px;">사장님, 어서오세요</div>
      </div>
      <span id="ap-status" style="font-size:12px;font-weight:600;color:var(--accent);background:var(--card);border-radius:20px;padding:6px 14px;"></span>
    </div>
  </div>

  <!-- 일지 조회 -->
  <div class="card">
    <h2>📋 일지 조회</h2>
    <div class="view-row" style="margin-bottom:8px;">
      <button class="view-btn" onclick="viewDiary(0)">📅 오늘</button>
      <button class="view-btn" onclick="viewDiary(-1)">📅 어제</button>
      <button class="view-btn" onclick="viewDiary(-2)">📅 그제</button>
    </div>
    <div class="view-row" style="margin-bottom:8px;">
      <input type="date" id="diaryDatePick" style="flex:1;">
      <button class="view-btn" style="flex:0 0 auto;padding:10px 16px;" onclick="viewDiaryPicked()">조회</button>
    </div>
    <button class="send-btn" onclick="organizeToday()" style="background:var(--card);color:var(--text);border:1.5px solid var(--border);">🗂 오늘 일지 정리</button>
  </div>

  <!-- 조회 결과 -->
  <div class="diary-view" id="diaryView">
    <div class="diary-header">
      <span class="diary-title" id="diaryTitle"></span>
      <button class="close-btn" onclick="closeDiary()">닫기</button>
    </div>
    <div class="diary-meta" id="diaryMeta"></div>
    <div class="timeline" id="diaryTimeline"></div>
    <div id="diaryAddBox" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
      <div class="tl-label" style="margin-bottom:6px;">➕ 이 날짜에 추가</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <select id="addSection" style="padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:13px;background:var(--card);color:var(--text);font-family:var(--font);">
          <option value="이동">📍 이동</option>
          <option value="메모함">메모함</option>
          <option value="오늘 한 일">오늘 한 일</option>
          <option value="일상">일상</option>
          <option value="점심 식사">점심 식사</option>
          <option value="저녁 식사">저녁 식사</option>
          <option value="잘 된 것">잘 된 것</option>
          <option value="아쉬운 것 / 배운 것">아쉬운 것 / 배운 것</option>
          <option value="내일 할 것">내일 할 것</option>
        </select>
        <input type="time" id="addTime" style="width:110px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:13px;background:var(--card);color:var(--text);font-family:var(--font);">
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <input type="text" id="addText" placeholder="놓쳤던 내용을 적으세요..." style="flex:1;" onkeydown="if(event.key==='Enter') addPastItem()">
        <button class="view-btn" style="flex:0 0 auto;padding:10px 16px;" onclick="addPastItem()">추가</button>
      </div>
    </div>
  </div>

  <!-- 메모 기록 -->
  <div class="card">
    <h2>메모 기록</h2>
    <div class="row">
      <input type="text" id="noteInput" placeholder="내용을 적으세요..." onkeydown="if(event.key==='Enter') openNotePopup()">
    </div>
    <button class="send-btn" onclick="openNotePopup()">기록하기</button>
  </div>

  <!-- 장소 기록 -->
  <div class="card">
    <h2>장소 기록</h2>

<script>
const REPO_OWNER = 'yamugyclaude';
const REPO_NAME  = 'jarvis-web';
const WORKFLOW   = 'location-log.yml';
const REF        = 'data';
const API_URL    = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${WORKFLOW}/dispatches`;

// ── 토큰 ──────────────────────────────────────────────────
function getToken() { return localStorage.getItem('jarvis_gh_token') || ''; }
function saveToken() {
  const val = document.getElementById('tokenInput').value.trim().replace(/[^\x20-\x7E]/g, '');

function checkToken() {

  document.getElementById('tokenBanner').style.display = 'block';

  return false;
}
function changeToken() {
  const banner = document.getElementById('tokenBanner');
  banner.style.display = 'block';
  const input = document.getElementById('tokenInput');
  input.value = getToken();
  banner.scrollIntoView({ behavior: 'smooth' });

}

// ── 테마(무드) ────────────────────────────────────────────
function setTheme(name) {
  document.body.dataset.theme = name;
  localStorage.setItem('jarvis_theme_v2', name);
  document.querySelectorAll('.mood').forEach(m => m.classList.toggle('active', m.dataset.t === name));

}
function updateStatus() {

  const hh = document.getElementById('hh-status'); if (hh) hh.textContent = on ? 'ONLINE' : 'NO TOKEN';
  const ap = document.getElementById('ap-status'); if (ap) ap.textContent = on ? '● 연결됨' : '토큰 필요';
}
const WD = ['일','월','화','수','목','금','토'];
function fillDates() {
  const now = new Date();
  const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
  const mo = kst.getMonth() + 1, da = kst.getDate(), wd = WD[kst.getDay()];
  const hcd = document.getElementById('hc-date'); if (hcd) hcd.textContent = `${wd}요일 · ${mo}월 ${da}일`;
  const hhd = document.getElementById('hh-date'); if (hhd) hhd.textContent = `${String(mo).padStart(2,'0')}.${String(da).padStart(2,'0')}`;
  const ccw = document.getElementById('cc-weekday'); if (ccw) ccw.textContent = `${wd}요일`;
  const ccd = document.getElementById('cc-date'); if (ccd) ccd.textContent = `${mo}. ${da}`;
  const apw = document.getElementById('ap-weekday'); if (apw) apw.textContent = `${wd}요일`;
  const apd = document.getElementById('ap-date'); if (apd) apd.textContent = `${mo}월 ${da}일`;
  tick();
}
let _clk;
function tick() {
  const now = new Date();
  const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
  const t = `${String(kst.getHours()).padStart(2,'0')}:${String(kst.getMinutes()).padStart(2,'0')}`;
  const el = document.getElementById('hh-time'); if (el) el.textContent = t;
}

// ── dispatch ──────────────────────────────────────────────
async function dispatch(inputs) {
  if (!checkToken()) return;
  showResult('⏳ 전송 중...', true);
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `token ${getToken().replace(/[^\x20-\x7E]/g, '')}`,
        'Accept': 'application/vnd.github+json',
      },
      body: JSON.stringify({ ref: REF, inputs }),
    });
    if (res.status === 204 || res.ok) {
      showResult('✅ 기록 완료! 텔레그램 알림이 올 거예요.', true);
    } else {
      const b = await res.json().catch(() => ({}));
      showResult(`❌ 오류 ${res.status}: ${b.message || '알 수 없는 오류'}`, false);
    }
  } catch (e) {
    showResult(`❌ 네트워크 오류: ${e.message}`, false);
  }
}

// ── 장소 카테고리 시스템 (GitHub 동기화) ──────────────────────
// _placeDB 형태: { "신혜식당": { cat: "식당", created_at: "..." }, ... }
let _placeDB = {};
try { _placeDB = JSON.parse(localStorage.getItem('jarvis_places') || '{}'); } catch(e) { _placeDB = {}; }

function getPlaceDB() { return _placeDB; }
function savePlaceDB(db) {
  _placeDB = db;
  localStorage.setItem('jarvis_places', JSON.stringify(db));
}
function getCategoryList() {
  const cats = new Set();
  Object.values(_placeDB).forEach(p => { if (p.cat) cats.add(p.cat); });
  return [...cats];
}

// GitHub places.json 불러오기 (모든 기기 공유)
async function loadPlacesFromGitHub() {
  if (!getToken()) return;
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/places.json?ref=${REF}`;
  try {
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${getToken().replace(/[^\x20-\x7E]/g,'')}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) return;
    const data = await res.json();
    const text = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    const parsed = JSON.parse(text);
    if (parsed && parsed.places) {
      _placeDB = parsed.places;
      localStorage.setItem('jarvis_places', JSON.stringify(_placeDB));
    }
  } catch(e) { /* 오프라인이면 localStorage 캐시 유지 */ }
}

let _pendingPlace = '';
let _selectedCat = '';

// ── GPS ──────────────────────────────────────────────────
function getGPS() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      ()  => resolve(null),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
    );
  });
}

// 두 좌표 간 거리(m) — haversine
function distM(a, b) {
  const R = 6371000, toR = d => d * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
  const x = Math.sin(dLat/2)**2 +
    Math.cos(toR(a.lat)) * Math.cos(toR(b.lat)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(x));
}

// 현재 위치 기준 가장 가까운(반경 내) 저장 장소
function nearestPlace(gps, radius = 80) {
  if (!gps) return null;
  let best = null, bestD = radius;
  for (const [name, p] of Object.entries(_placeDB)) {
    if (typeof p.lat !== 'number' || typeof p.lng !== 'number') continue;
    const d = distM(gps, { lat: p.lat, lng: p.lng });
    if (d <= bestD) { bestD = d; best = { name, dist: Math.round(d) }; }
  }
  return best;
}

async function sendPlace() {
  const place = document.getElementById('placeInput').value.trim();
  if (!place) { showResult('⚠️ 장소 이름을 입력하세요.', false); return; }
  closePlaceDropdown();
  const db = getPlaceDB();
  if (db[place]) {
    // 기존 저장 장소 → GPS 첨부해 바로 기록
    const gps = await getGPS();
    const inputs = { place };
    if (gps) { inputs.lat = String(gps.lat); inputs.lng = String(gps.lng); }
    dispatch(inputs);
    document.getElementById('placeInput').value = '';
  } else {
    // 신규 장소 → 카테고리 팝업
    _pendingPlace = place;
    _selectedCat = '';
    document.getElementById('catPlaceText').textContent = place;
    document.getElementById('selectedCatLabel').textContent = '없음';
    document.getElementById('catInput').value = '';
    renderCatChips();
    document.getElementById('catOverlay').classList.add('show');
  }
}

function renderCatChips() {
  const cats = getCategoryList();
  const container = document.getElementById('catChips');
  container.innerHTML = cats.map(c => `
    <button onclick="selectCat('${c}')" id="chip_${c.replace(/[^a-zA-Z0-9가-힣]/g,'_')}"
      style="padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;
      background:var(--card);color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;">
      ${c}
    </button>`).join('');
  if (!cats.length) container.innerHTML = '<span style="font-size:12px;color:var(--text2);">저장된 카테고리 없음 — 아래에서 새로 만드세요</span>';
}

function selectCat(cat) {
  _selectedCat = cat;
  document.getElementById('selectedCatLabel').textContent = cat;
  // 칩 강조
  document.querySelectorAll('#catChips button').forEach(b => {
    b.style.background = 'var(--card)'; b.style.color = 'var(--text)';
  });
  const chipId = 'chip_' + cat.replace(/[^a-zA-Z0-9가-힣]/g,'_');
  const chip = document.getElementById(chipId);
  if (chip) { chip.style.background = 'var(--btn-bg)'; chip.style.color = 'var(--btn-text)'; }
}

function addNewCategory() {
  const val = document.getElementById('catInput').value.trim();
  if (!val) return;
  selectCat(val);
  document.getElementById('catInput').value = '';
  renderCatChips();
  // 다시 선택 표시
  selectCat(val);
}

function closeCatPopup() {
  document.getElementById('catOverlay').classList.remove('show');
  _pendingPlace = '';
}

async function confirmCategory() {
  if (!_pendingPlace) return;
  const cat = _selectedCat || '기타';
  const place = _pendingPlace;
  document.getElementById('catOverlay').classList.remove('show');
  _pendingPlace = '';
  const gps = await getGPS();
  const db = getPlaceDB();
  // 낙관적 반영 (Actions가 places.json 갱신할 때까지 시간차 보완)
  db[place] = { cat, lat: gps ? gps.lat : null, lng: gps ? gps.lng : null,
    created_at: new Date().toISOString() };
  savePlaceDB(db);
  const inputs = { place, category: cat };
  if (gps) { inputs.lat = String(gps.lat); inputs.lng = String(gps.lng); }
  dispatch(inputs);
  document.getElementById('placeInput').value = '';
}

// 클릭 바깥 → 닫기
document.getElementById('catOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('catOverlay')) closeCatPopup();
});

// ── 장소 자동완성 ──────────────────────────────────────────────
function onPlaceInput() {
  const val = document.getElementById('placeInput').value.trim();
  const db = getPlaceDB();
  if (!val) { closePlaceDropdown(); return; }
  const matches = Object.keys(db).filter(p => p.includes(val));
  if (!matches.length) { closePlaceDropdown(); return; }
  const dd = document.getElementById('placeDropdown');
  dd.innerHTML = matches.map(p => {
    const cat = db[p].cat || '';
    return `<div onclick="selectPlace('${p.replace(/'/g,"\\'")}')"

      display:flex;justify-content:space-between;align-items:center;"
      onmouseenter="this.style.background='var(--meta-bg)'" onmouseleave="this.style.background='transparent'">
      <span>${p}</span>
      ${cat ? `<span style="font-size:11px;color:var(--text2);background:var(--meta-bg);
        padding:2px 8px;border-radius:10px;">${cat}</span>` : ''}

function selectPlace(name) {

document.addEventListener('click', e => {

// ── 메모 팝업 ──────────────────────────────────────────────
const FOOD = ["밥","식사","먹었","먹음","먹어","국밥","냉면","라면","김밥","떡볶이","피자",
  "짜장","짬뽕","초밥","파스타","샌드위치","도시락","고기","삼겹살","장어","치킨","야식","술","회식","점심","저녁"];
const WORK = ["완료","마침","완성","끝냄","작업","회의","미팅","출장","수정","시작"];

function autoClassify(text) {
  const n = text.toLowerCase();
  const now = new Date();
  const kstH = (now.getUTCHours() + 9) % 24;
  if (FOOD.some(w => n.includes(w))) {
    if (kstH >= 10 && kstH <= 15) return 'lunch';
    if (kstH >= 17 || kstH <= 3) return 'dinner';
    if (n.includes('점심')) return 'lunch';
    if (n.includes('저녁') || n.includes('회식') || n.includes('야식')) return 'dinner';
  }
  if (WORK.some(w => n.includes(w))) return 'work';
  return 'memo';
}

const SECTION_LABELS = {
  memo:'메모함', work:'오늘 한 일', life:'일상',
  lunch:'점심 식사', dinner:'저녁 식사', good:'잘 된 것',

};

function renderRestaurantChips() {

  const wrap = document.getElementById('restaurantChipWrap');

  const note = document.getElementById('noteInput').value.trim();
  if (note.includes(name)) return;
  const newNote = note ? `${note} @${name}` : name;
  document.getElementById('noteInput').value = newNote;

document.getElementById('noteOverlay').addEventListener('click', e => {

  const d = new Date();

  kst.setDate(kst.getDate() + offset);
  return kst.toISOString().slice(0, 10);
}

  '메모함':            { label: '메모',  dot: 'd-memo' },
  '오늘 한 일':        { label: '업무',  dot: 'd-work' },

  '점심 식사':         { label: '점심',  dot: 'd-lunch' },
  '저녁 식사':         { label: '저녁',  dot: 'd-dinner' },
  '잘 된 것':          { label: '✅ 잘된것', dot: 'd-good' },
  '아쉬운 것 / 배운 것': { label: '💡 배움', dot: 'd-learn' },

function parseDiary(text) {
  const lines = text.split('\n');
  const items = [];
  let inFM = false, fmDone = false, section = null;
  const fmMatch = text.match(/^---\n([\s\S]*?)\n---/);
  const fm = {};
  if (fmMatch) fmMatch[1].split('\n').forEach(l => {
    const m = l.match(/^(\w+):\s*"?([^"]*)"?$/);
    if (m) fm[m[1]] = m[2].trim();
  });
  for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
    const line = lines[lineIdx];
    if (line.trim() === '---') { inFM = !inFM; if (!inFM) fmDone = true; continue; }
    if (inFM) continue;
    if (line.startsWith('## ')) { section = line.slice(3).trim(); continue; }
    const locM = line.match(/^>\s*📍\s*(\d{2}:\d{2})\s*[—-]\s*(.+)/);
    if (locM) { items.push({ time: locM[1], text: locM[2].trim(), dot: 'd-location', label: '이동', rawLine: line, lineIndex: lineIdx, section: null }); continue; }
    if (line.startsWith('- ') && section) {
      const c = line.slice(2).trim();
      const tM = c.match(/^(\d{2}:\d{2})\s+(.+)/);
      const meta = TL_META[section] || { label: section, dot: 'd-memo' };
      items.push(tM
        ? { time: tM[1], text: tM[2], dot: meta.dot, label: meta.label, section, rawLine: line, lineIndex: lineIdx }
        : { time: '??:??', text: c, dot: meta.dot, label: meta.label, section, rawLine: line, lineIndex: lineIdx });
    }
  }
  items.sort((a, b) => a.time === '??:??' ? 1 : b.time === '??:??' ? -1 : a.time.localeCompare(b.time));
  return { fm, items };
}

function renderTimeline(items) {
  if (!items.length) return '<p style="color:var(--text2);font-size:13px;padding:8px 0;">기록 없음</p>';
  return items.map((item, i) => `
    <div class="tl-item" id="tl-item-${i}">
      <div class="tl-time">${item.time === '??:??' ? '' : item.time}</div>
      <div class="tl-col">
        <div class="tl-dot ${item.dot}"></div>
        ${i < items.length - 1 ? '<div class="tl-bar"></div>' : ''}
      </div>
      <div class="tl-body" style="display:flex;align-items:flex-start;">
        <div style="flex:1;">
          <div class="tl-label">${item.label}</div>
          <div class="tl-text" id="tl-text-${i}">${item.text}</div>
        </div>
          <div class="tl-actions">
          <button class="tl-action-btn" onclick="startItemEdit(${i})">✏️</button>
          <button class="tl-action-btn" onclick="deleteItem(${i})">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

function viewDiary(offset) { return loadDiary(getKSTDateStr(offset)); }

function viewDiaryPicked() {
  const date = document.getElementById('diaryDatePick').value;
  if (!date) { showResult('⚠️ 날짜를 선택하세요.', false); return; }
  loadDiary(date);
}

async function loadDiary(date) {
  if (!checkToken()) return;
  _diaryDate = date;
  const [y, m] = [date.slice(0,4), date.slice(5,7)];
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/diary/${y}/${m}/${date}.md?ref=${REF}`;
  _diaryFileUrl = url.split('?')[0];
  document.getElementById('diaryTitle').textContent = `📅 ${date}`;
  document.getElementById('diaryTimeline').innerHTML = '<p style="color:var(--text2);font-size:13px;padding:8px 0;">⏳ 불러오는 중...</p>';
  document.getElementById('diaryMeta').innerHTML = '';
  document.getElementById('diaryView').style.display = 'block';
  document.getElementById('diaryView').scrollIntoView({ behavior: 'smooth' });
  try {
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${getToken().replace(/[^\x20-\x7E]/g,'')}`, 'Accept': 'application/vnd.github+json' }
    });
    if (res.status === 404) {
      // 그날 일지 파일이 아직 없음 — 추가는 가능(새 파일 생성)
      _diaryFileSha = ''; _diaryRawText = ''; _diaryItems = [];
      document.getElementById('diaryMeta').innerHTML = '<span style="color:var(--text2)">메타 정보 없음</span>';
      document.getElementById('diaryTimeline').innerHTML = '<p style="color:var(--text2);font-size:13px;">📭 기록 없음 — 아래에서 추가할 수 있어요.</p>';
      return;
    }
    if (!res.ok) {
      _diaryFileSha = ''; _diaryRawText = '';
      document.getElementById('diaryTimeline').innerHTML = `<p style="color:var(--err-text);font-size:13px;">오류 ${res.status}</p>`;
      return;
    }
    const data = await res.json();
    const text = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    _diaryFileSha = data.sha;
    _diaryRawText = text;
    _diaryFileUrl = url.split('?')[0];
    const { fm, items } = parseDiary(text);
    _diaryItems = items;
    renderDiaryMetaReadonly(fm);
    document.getElementById('diaryTimeline').innerHTML = renderTimeline(items);
  } catch(e) {
    document.getElementById('diaryTimeline').innerHTML = `<p style="color:var(--err-text);font-size:13px;">오류: ${e.message}</p>`;
  }
}

function closeDiary() {
  document.getElementById('diaryView').style.display = 'none';
  document.getElementById('diaryTimeline').innerHTML = '';
  document.getElementById('diaryMeta').innerHTML = '';
  _diaryFileSha = '';
  _diaryRawText = '';
  _diaryFileUrl = '';
  _diaryDate = '';
}

let _diaryFm = {};

function renderDiaryMetaReadonly(fm) {
  _diaryFm = fm;
  const FIELDS = [
    { field:'time_in',   icon:'🏢', label:'출근',  type:'time' },
    { field:'time_out',  icon:'🚪', label:'퇴근',  type:'time' },
    { field:'time_home', icon:'🏠', label:'귀가',  type:'time' },
    { field:'location',  icon:'📍', label:'장소',  type:'text' },
    { field:'energy',    icon:'⚡', label:'에너지', type:'text' },
    { field:'mood',      icon:'😊', label:'기분',  type:'text' },
  ];
  const parts = FIELDS
    .filter(e => fm[e.field] && fm[e.field] !== '""')
    .map(e => `<span style="cursor:pointer;text-decoration:underline dotted;" title="클릭하여 수정" onclick="startMetaEdit('${e.field}','${e.type}','${(fm[e.field]||'').replace(/'/g,"\\'")}')">` +
      `${e.icon} ${e.label} ${fm[e.field]}</span>`);
  document.getElementById('diaryMeta').innerHTML = parts.join('') ||
    '<span style="color:var(--text2)">메타 정보 없음</span>';
}

function startMetaEdit(field, type, currentVal) {
  if (!_diaryFileSha || !_diaryRawText) { showResult('⚠️ 파일 정보 없음. 일지를 다시 열어주세요.', false); return; }
  const meta = document.getElementById('diaryMeta');
  const inputHtml = type === 'time'
    ? `<input type="time" id="meta-edit-input" value="${currentVal}" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);">`
    : `<input type="text" id="meta-edit-input" value="${currentVal}" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);width:120px;">`;
  meta.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:12px;color:var(--text2);">${field} 수정:</span>
      ${inputHtml}
      <button onclick="saveMetaField('${field}','${type}')"
        style="padding:4px 10px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);">저장</button>
      <button onclick="cancelMetaEdit()"
        style="padding:4px 8px;background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);">취소</button>
    </div>`;
  document.getElementById('meta-edit-input').focus();
}

function cancelMetaEdit() {
  renderDiaryMetaReadonly(_diaryFm);
}

async function saveMetaField(field, type) {
  const newVal = document.getElementById('meta-edit-input').value.trim();
  if (!newVal) { showResult('⚠️ 값을 입력하세요.', false); return; }

  await commitDiaryChange(latestRaw => {
    const oldFmLine = latestRaw.match(new RegExp(`^${field}:.*$`, 'm'));
    if (oldFmLine) {
      return latestRaw.replace(new RegExp(`^${field}:.*$`, 'm'), `${field}: ${newVal}`);
    }
    // 필드가 없으면 frontmatter 닫기 --- 앞에 추가
    return latestRaw.replace(/^(---\n[\s\S]*?)(---)/m, `$1${field}: ${newVal}\n$2`);
  }, '[jarvis] edit meta via web', '⏳ 저장 중...');
}

const DIARY_SECTIONS = ['오늘 한 일', '잘 된 것', '아쉬운 것 / 배운 것', '내일 할 것'];

  if (!item) return;
  const textEl = document.getElementById(`tl-text-${idx}`);
  if (!textEl) return;

  const timeVal = item.time === '??:??' ? '' : item.time;

  if (item.dot === 'd-location') {
    textEl.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="time" id="item-edit-time-${idx}" value="${timeVal}"
            style="padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);">
          <input type="text" id="item-edit-text-${idx}" value="${item.text.replace(/"/g,'&quot;')}" placeholder="장소 라벨"
            style="flex:1;padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);">
        </div>
        <div style="display:flex;gap:4px;">
          <button onclick="saveItemEdit(${idx})"
            style="padding:4px 10px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);">저장</button>
          <button onclick="cancelItemEdit(${idx})"
            style="padding:4px 8px;background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);">취소</button>
        </div>
      </div>`;
    document.getElementById(`item-edit-text-${idx}`).focus();
    return;
  }

  const sectionOptions = DIARY_SECTIONS.map(s =>
    `<option value="${s}" ${item.section === s ? 'selected' : ''}>${s}</option>`
  ).join('');

  textEl.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
      <select id="item-edit-section-${idx}" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);">
        ${sectionOptions}
      </select>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="time" id="item-edit-time-${idx}" value="${timeVal}"
          style="padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);">
        <input type="text" id="item-edit-text-${idx}" value="${item.text.replace(/"/g,'&quot;')}" placeholder="내용"
          style="flex:1;padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;background:var(--card);color:var(--text);font-family:var(--font);">
      </div>
      <div style="display:flex;gap:4px;">
        <button onclick="saveItemEdit(${idx})"
          style="padding:4px 10px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);">저장</button>
        <button onclick="cancelItemEdit(${idx})"
          style="padding:4px 8px;background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:var(--input-radius);font-size:12px;cursor:pointer;font-family:var(--font);">취소</button>
      </div>
    </div>`;
  document.getElementById(`item-edit-text-${idx}`).focus();
}

function cancelItemEdit(idx) {
  document.getElementById(`tl-text-${idx}`).innerHTML = _diaryItems[idx].text;
}

function replaceLineByIndex(raw, lineIndex, newLine) {
  const lines = raw.split('\n');
  if (newLine === null) {
    lines.splice(lineIndex, 1);
  } else {
    lines[lineIndex] = newLine;
  }
  return lines.join('\n');
}

// PUT 직전 최신 파일을 GET하여 sha 충돌(409)을 피하는 공통 헬퍼
async function commitDiaryChange(applyFn, message, busyMsg) {
  if (!_diaryFileSha || !_diaryRawText || !_diaryFileUrl) {
    showResult('⚠️ 파일 정보 없음. 일지를 다시 열어주세요.', false);
    return;
  }
  showResult(busyMsg, true);
  const token = getToken().replace(/[^\x20-\x7E]/g,'');
  // 자동기록이 같은 파일을 실시간 갱신할 수 있어, 409 시 최신 GET→PUT 재시도
  const MAX_ATTEMPTS = 6;
  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      const getRes = await fetch(`${_diaryFileUrl}?ref=${REF}&_=${Date.now()}`, {
        cache: 'no-store',
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
      });
      if (!getRes.ok) {
        showResult(`❌ 최신 파일 조회 실패 ${getRes.status} (잠시 후 다시)`, false);
        return;
      }
      const getData = await getRes.json();
      const latestRaw = decodeURIComponent(escape(atob(getData.content.replace(/\n/g,''))));
      const latestSha = getData.sha;

      const newRaw = applyFn(latestRaw);
      if (newRaw === null) {
        showResult('⚠️ 대상을 찾지 못했습니다. 새로고침 후 다시 시도해주세요.', false);
        return;
      }

      const encoded = btoa(unescape(encodeURIComponent(newRaw)));
      const res = await fetch(_diaryFileUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ message, content: encoded, sha: latestSha, branch: REF }),
      });
      if (res.ok) {
        const result = await res.json();
        _diaryFileSha = result.content.sha;
        _diaryRawText = newRaw;
        const { fm, items } = parseDiary(newRaw);
        _diaryItems = items;
        renderDiaryMetaReadonly(fm);
        document.getElementById('diaryTimeline').innerHTML = renderTimeline(items);
        showResult('✅ 완료!', true);
        return;
      }
      if (res.status === 409 && attempt < MAX_ATTEMPTS) {
        await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt - 1)));
        continue; // 그새 또 바뀜 → 최신으로 재시도 (지수 백오프)
      }
      const b = await res.json().catch(() => ({}));
      showResult(`❌ 저장 실패 ${res.status}: ${b.message || ''}`, false);
      return;
    } catch(e) {
      showResult(`❌ 네트워크 오류: ${e.message}`, false);
      return;
    }
  }
}

async function saveItemEdit(idx) {
  const item = _diaryItems[idx];
  const newTime = document.getElementById(`item-edit-time-${idx}`).value;
  const newContent = document.getElementById(`item-edit-text-${idx}`).value.trim();
  if (!newContent) { showResult('⚠️ 내용을 입력하세요.', false); return; }
  if (!_diaryFileSha || !_diaryRawText) { showResult('⚠️ 파일 정보 없음. 일지를 다시 열어주세요.', false); return; }

  await commitDiaryChange(latestRaw => {
    if (!latestRaw.includes(item.rawLine)) return null;
    let newLine;
    if (item.dot === 'd-location') {
      const timeStr = newTime || item.time;
      newLine = `> 📍 ${timeStr} — ${newContent}`;
      return latestRaw.replace(item.rawLine, newLine);
    }
    const newSection = document.getElementById(`item-edit-section-${idx}`).value;
    const newLineContent = newTime ? `${newTime} ${newContent}` : newContent;
    newLine = `- ${newLineContent}`;

    if (newSection !== item.section) {
      let raw = latestRaw.replace(`${item.rawLine}\n`, '') === latestRaw
        ? latestRaw.replace(item.rawLine, '')
        : latestRaw.replace(`${item.rawLine}\n`, '');
      const sectionHeader = `## ${newSection}`;
      if (raw.includes(sectionHeader)) {
        raw = raw.replace(sectionHeader, `${sectionHeader}\n${newLine}`);
      } else {
        raw = raw.trimEnd() + `\n\n## ${newSection}\n${newLine}\n`;
      }
      return raw;
    }
    return latestRaw.replace(item.rawLine, newLine);
  }, '[jarvis] edit item via web', '⏳ 저장 중...');
}

async function deleteItem(idx) {
  const item = _diaryItems[idx];
  if (!item) return;

  await commitDiaryChange(latestRaw => {
    if (latestRaw.includes(`${item.rawLine}\n`)) return latestRaw.replace(`${item.rawLine}\n`, '');
    if (latestRaw.includes(item.rawLine)) return latestRaw.replace(item.rawLine, '');
    return null;
  }, '[jarvis] delete item via web', '⏳ 삭제 중...');
}

// ── 과거 항목 추가 ─────────────────────────────────────────
const SECTION_ORDER = ['메모함','오늘 한 일','일상','점심 식사','저녁 식사','잘 된 것','아쉬운 것 / 배운 것','내일 할 것'];

function newDiaryTemplate(date) {
  return `---\ndate: ${date}\nlocation: ""\ntime_in: ""\ntime_out: ""\ntime_home: ""\nenergy: ""\nmood: ""\n---\n\n` +
    SECTION_ORDER.map(s => `## ${s}\n`).join('\n');
}

function insertUnderSection(raw, section, line) {
  const header = `## ${section}`;
  if (raw.includes(header)) return raw.replace(header, `${header}\n${line}`);
  return raw.trimEnd() + `\n\n${header}\n${line}\n`;
}

async function addPastItem() {
  if (!checkToken()) return;
  if (!_diaryDate) { showResult('⚠️ 먼저 날짜를 조회하세요.', false); return; }
  const section = document.getElementById('addSection').value;
  const time = document.getElementById('addTime').value;
  const text = document.getElementById('addText').value.trim();
  if (!text) { showResult('⚠️ 내용을 입력하세요.', false); return; }

  // 이동은 섹션 밖 별도 형식(> 📍 HH:MM — 내용), 나머지는 섹션 아래 - 항목
  let applyFn;
  if (section === '이동') {
    const locLine = `> 📍 ${time || '00:00'} — ${text}`;
    applyFn = raw => raw.trimEnd() + `\n${locLine}\n`;
  } else {
    const line = `- ${time ? time + ' ' : ''}${text}`;
    applyFn = raw => insertUnderSection(raw, section, line);
  }

  if (_diaryFileSha && _diaryRawText) {
    await commitDiaryChange(applyFn, '[jarvis] add item via web', '⏳ 추가 중...');
    document.getElementById('addText').value = '';
    return;
  }
  // 그날 일지 파일 자체가 없으면 새로 생성
  showResult('⏳ 새 일지 생성 중...', true);
  const token = getToken().replace(/[^\x20-\x7E]/g,'');
  const raw = applyFn(newDiaryTemplate(_diaryDate));
  try {
    const res = await fetch(_diaryFileUrl, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '[jarvis] create diary via web', content: btoa(unescape(encodeURIComponent(raw))), branch: REF }),
    });
    if (res.ok) {
      document.getElementById('addText').value = '';
      showResult('✅ 추가 완료!', true);
      loadDiary(_diaryDate);
      return;
    }
    if (res.status === 422) { // 그새 파일이 생김 → 다시 조회 후 추가
      showResult('⚠️ 파일이 방금 생성됐어요. 다시 조회 후 추가해주세요.', false);
      loadDiary(_diaryDate);
      return;
    }
    const b = await res.json().catch(() => ({}));
    showResult(`❌ 생성 실패 ${res.status}: ${b.message || ''}`, false);
  } catch(e) {
    showResult(`❌ 네트워크 오류: ${e.message}`, false);
  }
}

// ── 공통 ──────────────────────────────────────────────────
function showResult(msg, ok) {
  const el = document.getElementById('result');
  el.textContent = msg;
  el.className = ok ? 'ok' : 'err';
  el.style.display = 'block';
}

fillDates();

if (getToken()) {
  document.getElementById('tokenBanner').style.display = 'none';
  loadPlacesFromGitHub();
}

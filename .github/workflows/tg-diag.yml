name: 텔레그램 시크릿 등록 (임시)

on:
  workflow_dispatch:
    inputs:
      bot_token:
        description: '봇 토큰'
        required: true
      chat_id:
        description: 'chat_id'
        required: true

permissions:
  contents: read
  actions: write

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: gh CLI로 시크릿 등록
        env:
          GH_TOKEN: ${{ github.token }}
          BT: ${{ github.event.inputs.bot_token }}
          CID: ${{ github.event.inputs.chat_id }}
        run: |
          echo "$BT" | gh secret set TELEGRAM_BOT_TOKEN --repo yamugyclaude/jarvis-web
          echo "$CID" | gh secret set TELEGRAM_CHAT_ID --repo yamugyclaude/jarvis-web
          echo "완료"
